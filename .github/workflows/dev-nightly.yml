name: Nightly Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: branch-nightly-release
  cancel-in-progress: false

jobs:
  build-nightly:
    runs-on: macos-15

    steps:
      - name: Check out source branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Validate source branch
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if ! git check-ref-format --branch "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Branch name '${BRANCH_NAME}' is not valid." >&2
            exit 1
          fi

          if [[ "$BRANCH_NAME" == "nightly-feed" ]]; then
            echo "The nightly-feed branch stores update metadata and cannot be built." >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --heads origin "refs/heads/${BRANCH_NAME}" >/dev/null; then
            echo "Branch '${BRANCH_NAME}' does not exist on origin." >&2
            exit 1
          fi

      - name: Assign and commit build number
        id: version
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git pull --rebase origin "$BRANCH_NAME"
          next_build="$(date -u +%Y%m%d%H%M%S)"
          scripts/set-build-number.sh "$next_build"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ContentCam/Info.plist ContentCam.xcodeproj/project.pbxproj
          git commit -m "Bump build number to ${next_build} [skip ci]"
          git push origin "HEAD:refs/heads/${BRANCH_NAME}"

          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' ContentCam/Info.plist)"
          echo "build_number=$next_build" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create detailed Nightly changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.version.outputs.commit_sha }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          SOURCE_BRANCH: ${{ steps.version.outputs.branch_name }}
        run: |
          baseline_ref=""
          comparison_label="the repository's first commit"

          previous_nightly_tag="$(
            gh release list \
              --exclude-drafts \
              --limit 100 \
              --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")))] | .[0].tagName // ""'
          )"

          if [[ -n "$previous_nightly_tag" ]] &&
             git rev-parse --verify --quiet "${previous_nightly_tag}^{commit}" >/dev/null &&
             git merge-base --is-ancestor "$previous_nightly_tag" "$COMMIT_SHA"; then
            baseline_ref="$previous_nightly_tag"
            comparison_label="previous Nightly \`${previous_nightly_tag}\`"
          else
            previous_production_tag="$(
              gh release list \
                --exclude-drafts \
                --exclude-pre-releases \
                --limit 1 \
                --json tagName \
                --jq '.[0].tagName // ""'
            )"

            if [[ -n "$previous_production_tag" ]] &&
               git rev-parse --verify --quiet "${previous_production_tag}^{commit}" >/dev/null &&
               git merge-base --is-ancestor "$previous_production_tag" "$COMMIT_SHA"; then
              baseline_ref="$previous_production_tag"
              comparison_label="latest Production release \`${previous_production_tag}\`"
            fi
          fi

          scripts/commit-changelog.sh \
            "$baseline_ref" \
            "$COMMIT_SHA" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            "Commits since ${comparison_label}" > commit-changelog.md

          scripts/commit-changelog.sh \
            "$baseline_ref" \
            "$COMMIT_SHA" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            "Commits since ${comparison_label}" \
            short > in-app-commit-changelog.md

          scripts/nightly-release-notes.sh \
            "$VERSION" \
            "$BUILD_NUMBER" \
            "$COMMIT_SHA" \
            "$SOURCE_BRANCH" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            "$comparison_label" > nightly-release-notes.md
          printf '\n' >> nightly-release-notes.md
          cat commit-changelog.md >> nightly-release-notes.md

          scripts/in-app-release-notes.sh \
            "ContentCam Nightly ${BUILD_NUMBER}" \
            in-app-commit-changelog.md \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/nightly-${BUILD_NUMBER}" \
            > in-app-release-notes.md

      - name: Build universal macOS DMG
        run: scripts/build-release.sh

      - name: Add release notes to the in-app update
        run: scripts/attach-release-notes.sh build/release in-app-release-notes.md

      - name: Generate signed Nightly update feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          DOWNLOAD_URL_PREFIX: ${{ github.server_url }}/${{ github.repository }}/releases/download/nightly-${{ steps.version.outputs.build_number }}/
        run: |
          scripts/generate-appcast.sh \
            build/release \
            build/release/appcast-nightly.xml \
            "$DOWNLOAD_URL_PREFIX" \
            "${{ github.server_url }}/${{ github.repository }}/releases/tag/nightly-${{ steps.version.outputs.build_number }}"

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v6
        with:
          name: ContentCam-nightly-${{ steps.version.outputs.build_number }}
          path: |
            build/release/*.dmg
            build/release/appcast-nightly.xml
          if-no-files-found: error
          retention-days: 14

      - name: Publish new Nightly prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          COMMIT_SHA: ${{ steps.version.outputs.commit_sha }}
          SOURCE_BRANCH: ${{ steps.version.outputs.branch_name }}
          NIGHTLY_TAG: nightly-${{ steps.version.outputs.build_number }}
        run: |
          gh release create "$NIGHTLY_TAG" build/release/*.dmg build/release/appcast-nightly.xml \
            --target "$COMMIT_SHA" \
            --title "ContentCam Nightly ${BUILD_NUMBER} (${SOURCE_BRANCH})" \
            --notes-file nightly-release-notes.md \
            --prerelease

      - name: Point the Nightly update channel at this release
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.version.outputs.commit_sha }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          feed_branch="nightly-feed"

          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${feed_branch}" >/dev/null 2>&1; then
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/heads/${feed_branch}" \
              -f "sha=${COMMIT_SHA}" >/dev/null
          fi

          existing_feed_sha="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/contents/appcast-nightly.xml?ref=${feed_branch}" \
              --jq '.sha' 2>/dev/null || true
          )"
          encoded_feed="$(/usr/bin/base64 < build/release/appcast-nightly.xml | tr -d '\n')"
          api_arguments=(
            --method PUT
            "repos/${GITHUB_REPOSITORY}/contents/appcast-nightly.xml"
            -f "message=Point Nightly feed at build ${BUILD_NUMBER}"
            -f "content=${encoded_feed}"
            -f "branch=${feed_branch}"
          )

          if [[ -n "$existing_feed_sha" ]]; then
            api_arguments+=(-f "sha=${existing_feed_sha}")
          fi

          gh api "${api_arguments[@]}" >/dev/null

      - name: Keep older Nightly clients connected
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view nightly >/dev/null 2>&1; then
            gh release upload nightly build/release/appcast-nightly.xml --clobber
          fi
