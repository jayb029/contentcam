name: Main Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 1.0 or 1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Validate requested version
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Version must use the form 1.0 or 1.2.3." >&2
            exit 1
          fi

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists." >&2
            exit 1
          fi

      - name: Update and commit release version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git pull --rebase origin main
          scripts/set-marketing-version.sh "$VERSION"
          build_number="$(date -u +%Y%m%d%H%M%S)"
          scripts/set-build-number.sh "$build_number"

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ContentCam/Info.plist ContentCam.xcodeproj/project.pbxproj
            git commit -m "Prepare version ${VERSION} (${build_number})"
            git push origin HEAD:main
          fi

      - name: Read build metadata
        id: metadata
        run: |
          echo "build_number=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ContentCam/Info.plist)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create exact commit changelog
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ steps.metadata.outputs.commit_sha }}
        run: |
          previous_tag="$(
            gh release list \
              --exclude-drafts \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName // ""'
          )"

          if [[ -n "$previous_tag" ]]; then
            if ! git rev-parse --verify --quiet "${previous_tag}^{commit}" >/dev/null; then
              echo "Previous release tag ${previous_tag} is not available in the checkout." >&2
              exit 1
            fi

            if ! git merge-base --is-ancestor "$previous_tag" "$COMMIT_SHA"; then
              echo "Previous release tag ${previous_tag} is not an ancestor of ${COMMIT_SHA}." >&2
              exit 1
            fi

            range="${previous_tag}..${COMMIT_SHA}"
            heading="Commits since ${previous_tag}"
          else
            range="$COMMIT_SHA"
            heading="Commits in this release"
          fi

          {
            echo "## ${heading}"
            echo

            while IFS=$'\t' read -r sha subject; do
              printf -- '- [`%s`](https://github.com/%s/commit/%s) %s\n' \
                "$sha" "$GITHUB_REPOSITORY" "$sha" "$subject"
            done < <(git log --reverse --format='%H%x09%s' "$range")
          } > commit-changelog.md

      - name: Build universal macOS DMG
        run: scripts/build-release.sh

      - name: Generate signed Production update feed
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          DOWNLOAD_URL_PREFIX: ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ inputs.version }}/
        run: |
          scripts/generate-appcast.sh \
            build/release \
            build/release/appcast.xml \
            "$DOWNLOAD_URL_PREFIX"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: ContentCam-${{ inputs.version }}-${{ steps.metadata.outputs.build_number }}
          path: |
            build/release/*.dmg
            build/release/appcast.xml
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ steps.metadata.outputs.commit_sha }}
          BUILD_NUMBER: ${{ steps.metadata.outputs.build_number }}
        run: |
          release_notes="$(scripts/main-release-notes.sh \
            "$VERSION" \
            "$BUILD_NUMBER" \
            "$COMMIT_SHA" \
            "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}")"
          release_notes="${release_notes}"$'\n\n'"$(< commit-changelog.md)"

          gh release create "v${VERSION}" build/release/*.dmg build/release/appcast.xml \
            --target "$COMMIT_SHA" \
            --title "ContentCam ${VERSION}" \
            --notes "$release_notes" \
            --generate-notes
