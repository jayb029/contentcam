name: Main Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example, 1.0 or 1.2.3)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Validate requested version
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Version must use the form 1.0 or 1.2.3." >&2
            exit 1
          fi

          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists." >&2
            exit 1
          fi

      - name: Update and commit marketing version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git pull --rebase origin main
          scripts/set-marketing-version.sh "$VERSION"

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ContentCam/Info.plist ContentCam.xcodeproj/project.pbxproj
            git commit -m "Set version to ${VERSION}"
            git push origin HEAD:main
          fi

      - name: Read build metadata
        id: metadata
        run: |
          echo "build_number=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ContentCam/Info.plist)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build universal macOS app
        run: scripts/build-release.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: ContentCam-${{ inputs.version }}-${{ steps.metadata.outputs.build_number }}
          path: build/release/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          COMMIT_SHA: ${{ steps.metadata.outputs.commit_sha }}
        run: |
          gh release create "v${VERSION}" build/release/*.zip \
            --target "$COMMIT_SHA" \
            --title "ContentCam ${VERSION}" \
            --generate-notes
